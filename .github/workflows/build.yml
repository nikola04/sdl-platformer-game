name: Build

on:
    release:
        types: [created]

permissions:
    contents: write

jobs:
    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install SDL2
              run: |
                  vcpkg install sdl2:x64-windows sdl2-image:x64-windows
                  echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

            - name: Configure
              run: cmake -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

            - name: Build
              run: cmake --build build --config Release

            - name: Zip
              run: Compress-Archive -Path build/Release/game.exe, build/Release/*.dll, assets -DestinationPath game-windows-amd64.zip

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: game-windows-amd64
                  path: game-windows-amd64.zip

            - name: Upload to release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: game-windows-amd64.zip

    build-macos-arm:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install SDL2
              run: brew install sdl2 sdl2_image

            - name: Configure
              run: cmake -B build -DCMAKE_OSX_ARCHITECTURES=arm64

            - name: Build
              run: cmake --build build

            - name: Zip
              run: zip -r game-macos-apple-silicon.zip build/game assets/

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: game-macos-apple-silicon
                  path: game-macos-apple-silicon.zip

            - name: Upload to release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: game-macos-apple-silicon.zip
